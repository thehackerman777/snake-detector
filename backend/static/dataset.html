<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Dataset - Snake Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 0.8rem; }
        h1 { color: #22c55e; text-align: center; font-size: 1.2rem; margin-bottom: 0.2rem; }
        .stats { text-align: center; color: #94a3b8; font-size: 0.75rem; margin-bottom: 0.8rem; }
        .back-link { text-align: center; margin-bottom: 0.8rem; }
        .back-link a { color: #38bdf8; text-decoration: none; font-size: 0.85rem; }
        
        .morph-group { margin-bottom: 1rem; }
        .morph-header { 
            background: #1e293b; border-radius: 0.5rem; padding: 0.4rem 0.8rem; margin-bottom: 0.4rem;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #334155;
        }
        .morph-header .name { color: #22c55e; font-weight: bold; }
        .morph-header .badge { color: #94a3b8; font-size: 0.75rem; }
        
        .split-label { color: #64748b; font-size: 0.7rem; text-transform: uppercase; margin: 0.3rem 0; }
        .image-row { display: flex; gap: 0.3rem; overflow-x: auto; padding-bottom: 0.3rem; }
        .image-row img { width: 80px; height: 80px; object-fit: cover; border-radius: 0.3rem; border: 1px solid #334155; flex-shrink: 0; }
        
        footer { text-align: center; padding: 1rem; color: #64748b; font-size: 0.7rem; }
    </style>
</head>

        let html = "";
        
        for (const [morph, splits] of Object.entries(data)) {

            for (const s of Object.values(splits)) total += s.length;
            
            html += `<div class="morph-group">

            for (const [split, images] of Object.entries(splits)) {
                if (images.length === 0) continue;
                html += `<div class="split-label">${split} (${images.length})</div>
                    <div class="image-row">`;
                for (const img of images) {
                    html += `<img src="/dataset/${split}/${img}" loading="lazy">`;
                }
                html += `</div>`;
            }
            
            html += `</div>`;
        }
        
        content.innerHTML = html;
