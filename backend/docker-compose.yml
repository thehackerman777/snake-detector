version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snake-api
    ports:
      - "80:8000"
    volumes:
      - ./models:/app/models
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://snake:snake_pass@db:5432/snake_detector
      - OCI_BUCKET=snake-analytics-bucket
      - OCI_NAMESPACE=axynib9dtl3l
      - MODEL_PATH=/app/models/best.xml
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    container_name: snake-db
    environment:
      - POSTGRES_USER=snake
      - POSTGRES_PASSWORD=snake_pass
      - POSTGRES_DB=snake_detector
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snake -d snake_detector"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
