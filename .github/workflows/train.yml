name: Train Model

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Training epochs'
        required: true
        default: '100'
      model:
        description: 'Model variant'
        required: true
        default: 'yolov8n'

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ml-pipeline
          pip install -r requirements.txt

      - name: Download dataset
        run: |
          cd ml-pipeline
          python3 scripts/train.py --download

      - name: Train model
        run: |
          cd ml-pipeline
          python3 scripts/train.py --train --epochs ${{ inputs.epochs }} --device cpu

      - name: Export model
        run: |
          cd ml-pipeline
          python3 -c "
from scripts.train import export_model
import glob
best_pt = glob.glob('runs/detect/train*/weights/best.pt')[-1]
export_model(best_pt)
"

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exported-model
          path: ml-pipeline/**/best.*
          retention-days: 7
