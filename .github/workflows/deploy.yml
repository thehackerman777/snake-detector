name: Deploy Snake Detector

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'ml-pipeline/models/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Deploy to OCI
        env:
          SSH_HOST: ${{ secrets.OCI_HOST }}
          SSH_USER: ${{ secrets.OCI_USER }}
          SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > ssh_key.pem
          chmod 600 ssh_key.pem
          
          # Copy files to server
          rsync -avz -e "ssh -i ssh_key.pem -o StrictHostKeyChecking=no" \
            backend/ $SSH_USER@$SSH_HOST:/opt/snake-detector/backend/
          
          # Deploy with docker-compose
          ssh -i ssh_key.pem -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'EOF'
            cd /opt/snake-detector/backend
            docker-compose pull
            docker-compose up -d --build
            docker system prune -f
          EOF
          
          rm -f ssh_key.pem
